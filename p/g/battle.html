<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>飞机大战 - 增强版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #gameCanvas {
            display: block;
            touch-action: none;
            cursor: crosshair;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
            transition: opacity 0.3s;
            backdrop-filter: blur(4px);
        }

        .overlay.hidden {
            display: none;
        }

        .menu-content {
            text-align: center;
            color: #fff;
            padding: 40px;
        }

        .game-title {
            font-size: 56px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 0 30px rgba(255, 200, 0, 0.8), 0 4px 8px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
            animation: title-pulse 2s ease-in-out infinite;
        }

        @keyframes title-pulse {
            0%, 100% { text-shadow: 0 0 30px rgba(255, 200, 0, 0.8), 0 4px 8px rgba(0, 0, 0, 0.5); }
            50% { text-shadow: 0 0 50px rgba(255, 200, 0, 1), 0 4px 8px rgba(0, 0, 0, 0.5); }
        }

        .game-subtitle {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 30px;
        }

        h2 {
            font-size: 42px;
            color: #ff6644;
            text-shadow: 0 0 20px rgba(255, 100, 60, 0.8);
            margin-bottom: 30px;
            animation: heading-bounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes heading-bounce {
            0% { opacity: 0; transform: scale(0.5); }
            70% { transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .btn-primary {
            display: inline-block;
            padding: 16px 48px;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(180deg, #ff6644, #cc2200);
            border: 2px solid #ff8866;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            box-shadow: 0 6px 20px rgba(255, 100, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 100, 0, 0.6);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .high-score {
            margin-top: 24px;
            font-size: 18px;
            color: #ffaa44;
            text-shadow: 0 0 10px rgba(255, 170, 68, 0.5);
        }

        .final-score {
            font-size: 32px;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
            line-height: 1.8;
        }

        /* Combo display */
        #comboDisplay {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 0 15px rgba(255, 200, 0, 0.8), 0 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.2s;
        }

        #comboDisplay.show {
            animation: combo-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes combo-pop {
            0% { opacity: 0; transform: translateX(-50%) scale(0.5); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.3); }
            100% { opacity: 1; transform: translateX(-50%) scale(1); }
        }

        /* Damage flash overlay */
        #damageFlash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(255, 0, 0, 0.4) 100%);
            pointer-events: none;
            z-index: 4;
            opacity: 0;
            transition: opacity 0.1s;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="damageFlash"></div>
    <div id="comboDisplay"></div>

    <div id="menuScreen" class="overlay">
        <div class="menu-content">
            <h1 class="game-title">飞机大战</h1>
            <p class="game-subtitle">经典射击 · 增强版</p>
            <button id="startBtn" class="btn-primary">开始游戏</button>
            <div class="high-score">最高分：<span id="menuHighScore">0</span></div>
            <div class="controls-hint">
                鼠标/触摸：移动飞机<br>
                空格键/双击：释放炸弹<br>
                P键/ESC：暂停
            </div>
        </div>
    </div>

    <div id="pauseScreen" class="overlay hidden">
        <div class="menu-content">
            <h2>游戏暂停</h2>
            <button id="resumeBtn" class="btn-primary">继续游戏</button>
        </div>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <div class="menu-content">
            <h2>游戏结束</h2>
            <div class="final-score">得分：<span id="finalScore">0</span></div>
            <div class="high-score">最高分：<span id="highScore">0</span></div>
            <button id="restartBtn" class="btn-primary">再来一局</button>
        </div>
    </div>

    <script>
    'use strict';

    // ================================================================
    // 工具函数
    // ================================================================
    function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function randFloat(min, max) { return Math.random() * (max - min) + min; }
    function randChoice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function dist(x1, y1, x2, y2) { const dx = x1-x2, dy = y1-y2; return Math.sqrt(dx*dx + dy*dy); }

    function aabbCollision(boxA, boxB, factorA = 1, factorB = 1) {
        const wA = boxA.w || boxA.width;
        const hA = boxA.h || boxA.height;
        const wB = boxB.w || boxB.width;
        const hB = boxB.h || boxB.height;
        const hwA = wA * factorA * 0.5;
        const hhA = hA * factorA * 0.5;
        const hwB = wB * factorB * 0.5;
        const hhB = hB * factorB * 0.5;
        return boxA.x - hwA < boxB.x + hwB && boxA.x + hwA > boxB.x - hwB &&
               boxA.y - hhA < boxB.y + hhB && boxA.y + hhA > boxB.y - hhB;
    }

    function hexToRgba(hex, alpha = 1) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${b},${alpha})`;
    }

    // ================================================================
    // 配置常量
    // ================================================================
    const CONFIG = {
        WIDTH: 480, HEIGHT: 800,
        BG_COLOR: '#0a0a2e',
        STAR_COUNT: 100,
        PLAYER_LERP: 0.18,
        PLAYER_WIDTH: 44, PLAYER_HEIGHT: 52,
        PLAYER_LIVES: 3, MAX_BOMBS: 3,
        INVINCIBLE_DURATION: 2000,
        FIRE_INTERVAL_LV3: 100, FIRE_INTERVAL_BASE: 160,
        DOUBLE_TAP_INTERVAL: 300,
        SPAWN_BASE_INTERVAL: 1400, SPAWN_MIN_INTERVAL: 350, SPAWN_RANDOM_RANGE: 500,
        DIFFICULTY_STEP: 1000,
        HIT_FLASH_DURATION: 60,
        MAX_PARTICLES: 300,
        BOSS_TRIGGER_SCORES: [2000, 5000, 10000, 18000, 30000],
        HIGHSCORE_KEY: 'aircraft_shooter_highscore_v2',
        DT_CAP: 50,
        HIT_STOP_DURATION: 80,
        MAGNET_RANGE: 80,
        MAGNET_STRENGTH: 0.15,
        COMBO_TIMEOUT: 1500,
    };

    const ENEMY_TYPES = {
        small_white:  { hp: 1, speed: [2.5, 4], score: 100, width: 28, height: 28, shoot: false, pattern: 'straight', minScore: 0, color: '#cccccc', scale: 1 },
        small_yellow: { hp: 1, speed: [3, 4.5], score: 100, width: 28, height: 28, shoot: false, pattern: 'straight', minScore: 0, color: '#cccc00', scale: 1 },
        small_red:    { hp: 2, speed: [4.5, 6], score: 200, width: 28, height: 28, shoot: false, pattern: 'homing', minScore: 1000, color: '#cc0000', scale: 1 },
        medium_green: { hp: 4, speed: [1.5, 2.5], score: 300, width: 42, height: 42, shoot: 'single', pattern: 'straight', minScore: 500, color: '#00cc00', scale: 1 },
        medium_blue:  { hp: 5, speed: [1.5, 2.5], score: 400, width: 42, height: 42, shoot: 'aimed', pattern: 'straight', minScore: 800, color: '#0066cc', scale: 1 },
        large_purple: { hp: 10, speed: [0.6, 1.2], score: 800, width: 64, height: 64, shoot: 'spread', pattern: 'hover', minScore: 1500, color: '#8800cc', scale: 1 },
        large_red:    { hp: 12, speed: [0.6, 1.2], score: 1000, width: 64, height: 64, shoot: 'spread', pattern: 'hover', minScore: 2000, color: '#cc0000', scale: 1 },
    };

    const POWERUP_TYPES = {
        bomb:   { color: '#ff4444', label: 'B', glow: '#ff0000' },
        fireup: { color: '#ff8800', label: 'F', glow: '#ff6600' },
        shield: { color: '#4488ff', label: 'S', glow: '#0066ff' },
        heal:   { color: '#44ff44', label: '+', glow: '#00ff00' },
    };

    // ================================================================
    // 音效系统
    // ================================================================
    class AudioManager {
        constructor() { this.ctx = null; this.initialized = false; this.masterVolume = 0.25; }
        init() {
            if (this.initialized) return;
            try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); this.initialized = true; } catch(e) {}
        }
        resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }
        _createOsc(type, freq, t, dur, vol = 1) {
            if (!this.ctx) return null;
            const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, t);
            gain.gain.setValueAtTime(vol * this.masterVolume, t);
            osc.connect(gain); gain.connect(this.ctx.destination);
            return { osc, gain };
        }
        playShoot() {
            if (!this.ctx) return;
            const t = this.ctx.currentTime;
            const {osc,gain} = this._createOsc('square', 1400, t, 0.04, 0.06);
            if (!osc) return;
            osc.frequency.exponentialRampToValueAtTime(300, t+0.04);
            gain.gain.exponentialRampToValueAtTime(0.001, t+0.04);
            osc.start(t); osc.stop(t+0.04);
        }
        playHit() {
            if (!this.ctx) return;
            const t = this.ctx.currentTime;
            const {osc,gain} = this._createOsc('square', 700, t, 0.08, 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, t+0.08);
            osc.start(t); osc.stop(t+0.08);
        }
        playExplosion(big = false) {
            if (!this.ctx) return;
            const t = this.ctx.currentTime, dur = big ? 0.4 : 0.25;
            const {osc,gain} = this._createOsc('sawtooth', big ? 120 : 180, t, dur, big ? 0.2 : 0.12);
            osc.frequency.exponentialRampToValueAtTime(big ? 30 : 50, t+dur);
            gain.gain.exponentialRampToValueAtTime(0.001, t+dur);
            osc.start(t); osc.stop(t+dur);
        }
        playPowerup() {
            if (!this.ctx) return;
            const t = this.ctx.currentTime;
            const {osc,gain} = this._createOsc('sine', 600, t, 0.2, 0.1);
            osc.frequency.exponentialRampToValueAtTime(1500, t+0.1);
            osc.frequency.exponentialRampToValueAtTime(2000, t+0.2);
            gain.gain.exponentialRampToValueAtTime(0.001, t+0.2);
            osc.start(t); osc.stop(t+0.2);
        }
        playBomb() {
            if (!this.ctx) return;
            const t = this.ctx.currentTime;
            const {osc,gain} = this._createOsc('sawtooth', 60, t, 0.6, 0.25);
            osc.frequency.exponentialRampToValueAtTime(15, t+0.6);
            gain.gain.exponentialRampToValueAtTime(0.001, t+0.6);
            osc.start(t); osc.stop(t+0.6);
        }
        playDamage() {
            if (!this.ctx) return;
            const t = this.ctx.currentTime;
            const {osc,gain} = this._createOsc('sawtooth', 400, t, 0.3, 0.15);
            osc.frequency.exponentialRampToValueAtTime(80, t+0.3);
            gain.gain.exponentialRampToValueAtTime(0.001, t+0.3);
            osc.start(t); osc.stop(t+0.3);
        }
        playCombo(level) {
            if (!this.ctx) return;
            const t = this.ctx.currentTime;
            const baseFreq = 400 + level * 100;
            const {osc,gain} = this._createOsc('sine', baseFreq, t, 0.1, 0.08);
            osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, t+0.05);
            osc.frequency.exponentialRampToValueAtTime(baseFreq * 2, t+0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, t+0.1);
            osc.start(t); osc.stop(t+0.1);
        }
    }

    // ================================================================
    // 粒子系统（增强版）
    // ================================================================
    class ParticleSystem {
        constructor() { this.particles = []; }
        addHitParticles(x, y, color = '#ffcc00') {
            for (let i = 0; i < 8; i++) {
                const angle = Math.random() * Math.PI * 2;
                const spd = randFloat(2, 5);
                this.particles.push({
                    x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
                    life: 1, decay: randFloat(0.04, 0.08), size: randFloat(2, 4),
                    color, type: 'spark', gravity: 0.05
                });
            }
        }
        addExplosion(x, y, size = 'medium', color = null) {
            let count, speed, colors;
            switch(size) {
                case 'small': count = 20; speed = 6; colors = ['#ff9900','#ffcc00','#ff6600']; break;
                case 'medium': count = 30; speed = 7; colors = ['#ff9900','#ffcc00','#ff6600','#ffffff']; break;
                case 'large': count = 50; speed = 10; colors = ['#ff0000','#ff6600','#ffcc00','#ffff00','#ffffff']; break;
                case 'boss': count = 80; speed = 12; colors = ['#ff0000','#ff6600','#ffcc00','#ffff00','#ffffff','#ff00ff']; break;
            }
            if (color) colors = [color, '#ffffff', '#ffcc00'];
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const spd = randFloat(2, speed);
                this.particles.push({
                    x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
                    life: 1, decay: randFloat(0.012, 0.03), size: randFloat(2, size==='large'||size==='boss'?7:5),
                    color: randChoice(colors), type: 'explosion', gravity: 0.08,
                    rotation: Math.random()*Math.PI*2, rotSpeed: (Math.random()-0.5)*0.3
                });
            }
            for (let i = 0; i < count/2; i++) {
                const angle = Math.random() * Math.PI * 2;
                const spd = randFloat(1, speed*0.5);
                this.particles.push({
                    x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd - 1,
                    life: 1, decay: randFloat(0.02, 0.04), size: randFloat(4, 8),
                    color: '#ffaa00', type: 'smoke', gravity: -0.02, alpha: 0.5
                });
            }
        }
        addCollectParticles(x, y, color) {
            for (let i = 0; i < 16; i++) {
                const angle = (Math.PI*2*i)/16;
                const spd = randFloat(3, 6);
                this.particles.push({
                    x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
                    life: 1, decay: randFloat(0.025, 0.05), size: randFloat(2, 4),
                    color: color || '#ffffff', type: 'collect', gravity: 0
                });
            }
        }
        addTrail(x, y, color, size = 2) {
            this.particles.push({
                x: x + randFloat(-2, 2), y: y + randFloat(-2, 2),
                vx: randFloat(-0.3, 0.3), vy: randFloat(0.5, 1.5),
                life: 1, decay: 0.08, size: randFloat(size*0.7, size*1.2),
                color, type: 'trail', gravity: 0
            });
        }
        addThrusterParticles(x, y) {
            for (let i = 0; i < 2; i++) {
                this.particles.push({
                    x: x + randFloat(-4, 4), y: y,
                    vx: randFloat(-0.5, 0.5), vy: randFloat(2, 4),
                    life: 1, decay: randFloat(0.05, 0.1), size: randFloat(2, 5),
                    color: randChoice(['#ffffff','#ffaa00','#ff4400']), type: 'thruster', gravity: 0
                });
            }
        }
        update(dt) {
            const f = dt/16.67;
            for (let i = this.particles.length-1; i >= 0; i--) {
                const p = this.particles[i];
                p.x += p.vx*f; p.y += p.vy*f;
                if (p.gravity) p.vy += p.gravity*f;
                p.life -= p.decay*f;
                if (p.rotSpeed) p.rotation += p.rotSpeed*f;
                p.size *= (1 - 0.015*f);
                if (p.life <= 0 || p.size < 0.2) this.particles.splice(i, 1);
            }
            if (this.particles.length > CONFIG.MAX_PARTICLES)
                this.particles.splice(0, this.particles.length - CONFIG.MAX_PARTICLES);
        }
        render(ctx) {
            for (const p of this.particles) {
                ctx.save();
                ctx.globalAlpha = clamp(p.life * (p.alpha || 1), 0, 1);
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = p.type === 'trail' ? 3 : 8;
                if (p.rotation !== undefined) {
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                } else {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(0.3, p.size), 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }
        clear() { this.particles.length = 0; }
    }

    // ================================================================
    // 屏幕震动（增强版-方向性）
    // ================================================================
    class ScreenShake {
        constructor() { this.offsetX=0; this.offsetY=0; this.intensity=0; this.duration=0; this.elapsed=0; this.active=false; this.directionX=0; this.directionY=0; }
        trigger(intensity, duration, dirX = 0, dirY = 0) {
            this.intensity = intensity; this.duration = duration; this.elapsed = 0; this.active = true;
            this.directionX = dirX; this.directionY = dirY;
        }
        update(dt) {
            if (!this.active) { this.offsetX=0; this.offsetY=0; return; }
            this.elapsed += dt;
            if (this.elapsed >= this.duration) { this.active=false; this.offsetX=0; this.offsetY=0; return; }
            const p = 1 - this.elapsed/this.duration;
            const ci = this.intensity * p;
            const dirInfluence = 0.6;
            this.offsetX = this.directionX * ci * dirInfluence + (Math.random()*2-1) * ci * (1-dirInfluence);
            this.offsetY = this.directionY * ci * dirInfluence + (Math.random()*2-1) * ci * (1-dirInfluence);
        }
        apply(ctx) { ctx.translate(this.offsetX, this.offsetY); }
    }

    // ================================================================
    // 命中停顿系统
    // ================================================================
    class HitStop {
        constructor() { this.timer = 0; this.active = false; }
        trigger(duration) { this.timer = duration; this.active = true; }
        update(dt) {
            if (!this.active) return false;
            this.timer -= dt;
            if (this.timer <= 0) { this.active = false; return false; }
            return true;
        }
    }

    // ================================================================
    // 连击系统
    // ================================================================
    class ComboSystem {
        constructor(displayEl) {
            this.combo = 0; this.timer = 0; this.displayEl = displayEl;
        }
        addKill() {
            this.combo++;
            this.timer = CONFIG.COMBO_TIMEOUT;
            if (this.combo >= 3) this.show();
            return this.combo;
        }
        update(dt) {
            if (this.timer > 0) {
                this.timer -= dt;
                if (this.timer <= 0) this.reset();
            }
        }
        reset() {
            this.combo = 0;
            if (this.displayEl) this.displayEl.classList.remove('show');
        }
        show() {
            if (!this.displayEl) return;
            this.displayEl.textContent = `${this.combo} 连击!`;
            this.displayEl.classList.remove('show');
            void this.displayEl.offsetWidth;
            this.displayEl.classList.add('show');
        }
        getMultiplier() {
            if (this.combo >= 20) return 3;
            if (this.combo >= 10) return 2;
            if (this.combo >= 5) return 1.5;
            return 1;
        }
    }

    // ================================================================
    // 玩家飞机（增强版-带倾斜）
    // ================================================================
    class Player {
        constructor(cw, ch) {
            this.x = cw/2; this.y = ch-100;
            this.targetX = this.x; this.targetY = this.y;
            this.prevX = this.x; this.prevY = this.y;
            this.tilt = 0; this.tiltTarget = 0;
            this.width = CONFIG.PLAYER_WIDTH; this.height = CONFIG.PLAYER_HEIGHT;
            this.lives = CONFIG.PLAYER_LIVES; this.maxLives = CONFIG.PLAYER_LIVES;
            this.fireLevel = 1; this.bombCount = 1;
            this.invincible = false; this.invincibleTimer = 0;
            this.shieldActive = false;
            this.fireCooldown = 0;
            this.cw = cw; this.ch = ch;
            this.active = true;
            this.scaleX = 1; this.scaleY = 1;
            this.damageFlash = 0;
        }
        reset() {
            this.x = this.cw/2; this.y = this.ch-100;
            this.targetX = this.x; this.targetY = this.y;
            this.prevX = this.x; this.prevY = this.y;
            this.tilt = 0; this.tiltTarget = 0;
            this.lives = CONFIG.PLAYER_LIVES; this.fireLevel = 1; this.bombCount = 1;
            this.invincible = false; this.invincibleTimer = 0; this.shieldActive = false;
            this.fireCooldown = 0; this.active = true; this.scaleX=1; this.scaleY=1;
            this.damageFlash = 0;
        }
        setTarget(x, y) { this.targetX = x; this.targetY = y; }
        update(dt) {
            this.prevX = this.x; this.prevY = this.y;
            this.x = lerp(this.x, this.targetX, CONFIG.PLAYER_LERP);
            this.y = lerp(this.y, this.targetY, CONFIG.PLAYER_LERP);
            this.x = clamp(this.x, this.width/2, this.cw - this.width/2);
            this.y = clamp(this.y, this.height/2, this.ch - this.height/2);

            const vx = this.x - this.prevX;
            this.tiltTarget = clamp(vx * 0.8, -0.35, 0.35);
            this.tilt = lerp(this.tilt, this.tiltTarget, 0.15);

            const speed = Math.abs(vx);
            if (speed > 2) {
                this.scaleX = 1 - speed * 0.008;
                this.scaleY = 1 + speed * 0.01;
            } else {
                this.scaleX = lerp(this.scaleX, 1, 0.1);
                this.scaleY = lerp(this.scaleY, 1, 0.1);
            }

            if (this.fireCooldown > 0) this.fireCooldown -= dt;
            if (this.invincible) {
                this.invincibleTimer -= dt;
                if (this.invincibleTimer <= 0) { this.invincible = false; this.invincibleTimer = 0; }
            }
            if (this.damageFlash > 0) this.damageFlash -= dt;
        }
        fire() {
            if (this.fireCooldown > 0) return [];
            const interval = this.fireLevel >= 3 ? CONFIG.FIRE_INTERVAL_LV3 : CONFIG.FIRE_INTERVAL_BASE;
            this.fireCooldown = interval;
            const bullets = [];
            const bs = -12, bx = this.x, by = this.y - this.height/2;
            switch(this.fireLevel) {
                case 1:
                    bullets.push(new Bullet(bx, by, 0, bs, 1, false, '#44ccff')); break;
                case 2:
                    bullets.push(new Bullet(bx-7, by, 0, bs, 1, false, '#44ccff'));
                    bullets.push(new Bullet(bx+7, by, 0, bs, 1, false, '#44ccff')); break;
                case 3:
                    bullets.push(new Bullet(bx, by, 0, bs, 1, false, '#66ddff'));
                    bullets.push(new Bullet(bx-8, by, -1.2, bs, 1, false, '#66ddff'));
                    bullets.push(new Bullet(bx+8, by, 1.2, bs, 1, false, '#66ddff')); break;
                case 4:
                    bullets.push(new Bullet(bx-7, by, 0, bs, 1, false, '#88eeff'));
                    bullets.push(new Bullet(bx+7, by, 0, bs, 1, false, '#88eeff'));
                    bullets.push(new Bullet(bx-14, by+5, -2.5, bs*0.95, 1, false, '#88eeff'));
                    bullets.push(new Bullet(bx+14, by+5, 2.5, bs*0.95, 1, false, '#88eeff')); break;
                default:
                    bullets.push(new Bullet(bx, by, 0, bs, 2, false, '#aaeeff'));
                    bullets.push(new Bullet(bx-8, by, -1, bs, 1, false, '#aaeeff'));
                    bullets.push(new Bullet(bx+8, by, 1, bs, 1, false, '#aaeeff'));
                    bullets.push(new Bullet(bx-18, by+5, -3.5, bs*0.9, 1, false, '#aaeeff'));
                    bullets.push(new Bullet(bx+18, by+5, 3.5, bs*0.9, 1, false, '#aaeeff'));
            }
            return bullets;
        }
        takeDamage() {
            if (this.invincible) return false;
            if (this.shieldActive) {
                this.shieldActive = false;
                this.invincible = true; this.invincibleTimer = 1000;
                this.damageFlash = 100;
                return false;
            }
            this.lives--;
            this.invincible = true; this.invincibleTimer = CONFIG.INVINCIBLE_DURATION;
            this.damageFlash = 200;
            if (this.fireLevel > 1) this.fireLevel--;
            if (this.lives <= 0) this.active = false;
            return true;
        }
        upgradeFire() { if (this.fireLevel < 5) this.fireLevel++; }
        addBomb() { if (this.bombCount < CONFIG.MAX_BOMBS) this.bombCount++; }
        useBomb() { if (this.bombCount > 0) { this.bombCount--; return true; } return false; }
        activateShield() { this.shieldActive = true; }
        heal() { if (this.lives < this.maxLives) { this.lives++; return true; } return false; }
        render(ctx, particles) {
            if (this.invincible && Math.floor(this.invincibleTimer/70)%2 === 0) return;
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.tilt);
            ctx.scale(this.scaleX, this.scaleY);

            const hw = this.width/2, hh = this.height/2;

            const flameLen = randFloat(15, 28);
            const fg = ctx.createLinearGradient(0, hh, 0, hh+flameLen);
            fg.addColorStop(0, '#ffffff'); fg.addColorStop(0.2, '#ffcc00');
            fg.addColorStop(0.5, '#ff4400'); fg.addColorStop(1, 'rgba(255,0,0,0)');
            ctx.fillStyle = fg;
            ctx.beginPath();
            ctx.moveTo(-7, hh); ctx.lineTo(7, hh);
            ctx.lineTo(2+Math.random()*3, hh+flameLen); ctx.lineTo(-2-Math.random()*3, hh+flameLen);
            ctx.closePath(); ctx.fill();
            if (particles) particles.addThrusterParticles(0, hh+5);

            const sfl = randFloat(8, 14);
            for (const side of [-1, 1]) {
                const sfg = ctx.createLinearGradient(side*(hw-8), hh-8, side*(hw-8), hh-8+sfl);
                sfg.addColorStop(0, '#ffcc00'); sfg.addColorStop(1, 'rgba(255,68,0,0)');
                ctx.fillStyle = sfg;
                ctx.beginPath();
                ctx.moveTo(side*(hw-10), hh-8); ctx.lineTo(side*(hw-6), hh-8);
                ctx.lineTo(side*(hw-8), hh-8+sfl); ctx.closePath(); ctx.fill();
            }

            ctx.fillStyle = '#2266bb';
            ctx.beginPath();
            ctx.moveTo(-10, 8); ctx.lineTo(-hw-2, hh-10); ctx.lineTo(-hw+4, hh-14); ctx.lineTo(-8, 2);
            ctx.closePath(); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(10, 8); ctx.lineTo(hw+2, hh-10); ctx.lineTo(hw-4, hh-14); ctx.lineTo(8, 2);
            ctx.closePath(); ctx.fill();

            const bg = ctx.createLinearGradient(0, -hh, 0, hh);
            bg.addColorStop(0, this.damageFlash > 0 ? '#ff6666' : '#4488ff');
            bg.addColorStop(0.5, this.damageFlash > 0 ? '#cc3333' : '#2266dd');
            bg.addColorStop(1, this.damageFlash > 0 ? '#991111' : '#1144aa');
            ctx.fillStyle = bg;
            ctx.beginPath();
            ctx.moveTo(0, -hh); ctx.lineTo(hw-6, hh-6); ctx.lineTo(0, hh-12); ctx.lineTo(-hw+6, hh-6);
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle = '#66aaff'; ctx.lineWidth = 1.5; ctx.stroke();

            const cg = ctx.createRadialGradient(0, -6, 2, 0, -6, 9);
            cg.addColorStop(0, '#cceeff'); cg.addColorStop(0.6, '#44aadd'); cg.addColorStop(1, '#2266aa');
            ctx.fillStyle = cg;
            ctx.beginPath(); ctx.ellipse(0, -6, 6, 9, 0, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#88ccff'; ctx.lineWidth = 0.5; ctx.stroke();

            if (this.shieldActive) {
                const sp = 0.4 + 0.2*Math.sin(Date.now()/150);
                ctx.strokeStyle = `rgba(68,200,255,${sp+0.5})`;
                ctx.lineWidth = 3; ctx.shadowColor = '#44ccff'; ctx.shadowBlur = 15;
                ctx.beginPath(); ctx.arc(0, 0, hw+10, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle = `rgba(68,200,255,${sp*0.2})`; ctx.fill();
                ctx.shadowBlur = 0;
            }
            ctx.restore();
        }
    }

    // ================================================================
    // 子弹（带拖尾）
    // ================================================================
    class Bullet {
        constructor(x, y, vx, vy, dmg, enemy, color = null) {
            this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.damage=dmg; this.isEnemy=enemy;
            this.width = enemy ? 10 : 8; this.height = enemy ? 10 : 16; this.active=true;
            this.color = color || (enemy ? '#ff3333' : '#44ccff');
            this.trail = [];
        }
        update(dt, cw, ch) {
            const f = dt/16.67;
            this.trail.unshift({x:this.x, y:this.y});
            if (this.trail.length > 6) this.trail.pop();
            this.x += this.vx*f; this.y += this.vy*f;
            if (this.y < -30 || this.y > ch+30 || this.x < -30 || this.x > cw+30) this.active=false;
        }
        render(ctx, particles) {
            ctx.save();
            for (let i = 0; i < this.trail.length; i++) {
                const t = this.trail[i];
                ctx.globalAlpha = (1 - i/this.trail.length) * 0.4;
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color; ctx.shadowBlur = 4;
                const sz = (this.isEnemy ? 3 : 4) * (1 - i/this.trail.length);
                ctx.beginPath(); ctx.arc(t.x, t.y, sz, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1;
            if (this.isEnemy) {
                ctx.fillStyle = '#ff5555'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=10;
                ctx.beginPath(); ctx.arc(this.x, this.y, 5, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ffaaaa';
                ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.fillStyle = this.color; ctx.shadowColor=this.color; ctx.shadowBlur=12;
                ctx.beginPath(); ctx.ellipse(this.x, this.y, 3, 8, Math.atan2(this.vy, this.vx)+Math.PI/2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.ellipse(this.x, this.y, 1.5, 5, Math.atan2(this.vy, this.vx)+Math.PI/2, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
        }
    }

    // ================================================================
    // 敌机（增强版-带挤压拉伸）
    // ================================================================
    class Enemy {
        constructor(typeKey, x, y, cw) {
            const t = ENEMY_TYPES[typeKey];
            this.typeKey=typeKey; this.x=x; this.y=y; this.width=t.width; this.height=t.height;
            this.hp=t.hp; this.maxHp=t.hp; this.speed=randFloat(t.speed[0],t.speed[1]);
            this.score=t.score; this.shootMode=t.shoot; this.pattern=t.pattern;
            this.color=t.color; this.active=true; this.cw=cw;
            this.shootCooldown=randFloat(800,2000); this.shootTimer=this.shootCooldown;
            this.sineOffset=Math.random()*Math.PI*2; this.sineAmplitude=randFloat(20,50);
            this.sineFrequency=randFloat(0.02,0.04); this.hoverY=randFloat(100,180);
            this.hoverDir=Math.random()>0.5?1:-1; this.hoverSpeed=randFloat(0.3,0.8);
            this.elapsed=0; this.entering=this.pattern==='hover';
            this.flashTimer=0; this.scaleX=1; this.scaleY=1;
            this.hitScaleX=1; this.hitScaleY=1;
        }
        update(dt, ch, player) {
            const f = dt/16.67; this.elapsed+=dt;
            if (this.flashTimer>0) this.flashTimer-=dt;
            this.hitScaleX = lerp(this.hitScaleX, 1, 0.15);
            this.hitScaleY = lerp(this.hitScaleY, 1, 0.15);
            if (this.shootMode) this.shootTimer-=dt;

            switch(this.pattern) {
                case 'straight':
                    this.y += this.speed*f;
                    this.x += Math.sin(this.elapsed*this.sineFrequency+this.sineOffset)*1*f;
                    this.scaleX = 1; this.scaleY = 1;
                    break;
                case 'homing':
                    if (player && player.active) {
                        const dx=player.x-this.x, dy=player.y-this.y;
                        const d=Math.max(1,Math.sqrt(dx*dx+dy*dy));
                        this.x += (dx/d)*this.speed*0.6*f; this.y += (dy/d)*this.speed*0.6*f;
                    } else this.y += this.speed*f;
                    this.scaleX = 1.05; this.scaleY = 0.95;
                    break;
                case 'hover':
                    if (this.entering) {
                        this.y += this.speed*2.5*f;
                        this.scaleY = 0.85 + (this.y/this.hoverY)*0.15;
                        this.scaleX = 1.15 - (this.y/this.hoverY)*0.15;
                        if (this.y >= this.hoverY) { this.y=this.hoverY; this.entering=false; }
                    } else {
                        this.x += this.hoverDir*this.hoverSpeed*f;
                        if (this.x < this.width/2+10) this.hoverDir=1;
                        else if (this.x > this.cw-this.width/2-10) this.hoverDir=-1;
                        this.scaleX = 1; this.scaleY = 1;
                    }
                    break;
            }
            if (this.y > ch+60) this.active=false;
            if (this.pattern==='hover' && !this.entering && this.elapsed>30000) this.active=false;
        }
        fire(player) {
            if (!this.shootMode || this.shootTimer>0 || this.entering) return [];
            this.shootTimer=this.shootCooldown;
            const bullets=[]; const bs=4.5;
            switch(this.shootMode) {
                case 'single':
                    bullets.push(new Bullet(this.x, this.y+this.height/2, 0, bs, 1, true)); break;
                case 'aimed':
                    if (!player||!player.active) break;
                    const dx=player.x-this.x, dy=player.y-this.y, d=Math.max(1,Math.sqrt(dx*dx+dy*dy));
                    bullets.push(new Bullet(this.x, this.y+this.height/2, (dx/d)*bs, (dy/d)*bs, 1, true)); break;
                case 'spread':
                    for (let i=-2;i<=2;i++) {
                        const a=Math.PI/2+i*0.28;
                        bullets.push(new Bullet(this.x, this.y+this.height/2, Math.cos(a)*bs, Math.sin(a)*bs, 1, true));
                    } break;
            }
            return bullets;
        }
        takeDamage(dmg) {
            this.hp-=dmg; this.flashTimer=CONFIG.HIT_FLASH_DURATION;
            this.hitScaleX = 0.8; this.hitScaleY = 1.3;
            return this.hp<=0;
        }
        render(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.scaleX * this.hitScaleX, this.scaleY * this.hitScaleY);
            const flash = this.flashTimer>0;
            if (this.width<=30) this._drawSmall(ctx,flash);
            else if (this.width<=50) this._drawMedium(ctx,flash);
            else this._drawLarge(ctx,flash);
            if (this.maxHp>1) this._drawHealthBar(ctx);
            ctx.restore();
        }
        _drawSmall(ctx, flash) {
            const hw=this.width/2, hh=this.height/2;
            const g = ctx.createLinearGradient(0,-hh,0,hh);
            if (flash) { g.addColorStop(0,'#fff'); g.addColorStop(1,'#ddd'); }
            else { g.addColorStop(0,this.color); g.addColorStop(1,hexToRgba(this.color,0.5)); }
            ctx.fillStyle=g; ctx.beginPath();
            ctx.moveTo(0,hh); ctx.lineTo(-hw,-hh); ctx.lineTo(0,-hh+10); ctx.lineTo(hw,-hh);
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle=flash?'#fff':hexToRgba(this.color,0.8); ctx.lineWidth=1.5; ctx.stroke();
            if (!flash) {
                ctx.fillStyle=hexToRgba(this.color,0.9); ctx.shadowColor=this.color; ctx.shadowBlur=5;
                ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
            }
        }
        _drawMedium(ctx, flash) {
            const hw=this.width/2, hh=this.height/2;
            const g = ctx.createRadialGradient(0,0,2,0,0,hw);
            if (flash) { g.addColorStop(0,'#fff'); g.addColorStop(1,'#ddd'); }
            else { g.addColorStop(0,hexToRgba(this.color,1)); g.addColorStop(1,hexToRgba(this.color,0.3)); }
            ctx.fillStyle=g; ctx.beginPath();
            ctx.moveTo(0,-hh); ctx.lineTo(hw,0); ctx.lineTo(0,hh); ctx.lineTo(-hw,0);
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle=flash?'#fff':this.color; ctx.lineWidth=2; ctx.stroke();
            if (!flash) {
                ctx.fillStyle=hexToRgba(this.color,0.5);
                ctx.beginPath(); ctx.moveTo(0,-hh+8); ctx.lineTo(hw-8,0); ctx.lineTo(0,hh-8); ctx.lineTo(-hw+8,0);
                ctx.closePath(); ctx.fill();
            }
            ctx.fillStyle=flash?'#fff':hexToRgba(this.color,1); ctx.shadowColor=this.color; ctx.shadowBlur=8;
            ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
        }
        _drawLarge(ctx, flash) {
            const hw=this.width/2, hh=this.height/2;
            const g = ctx.createRadialGradient(0,0,5,0,0,hw);
            if (flash) { g.addColorStop(0,'#fff'); g.addColorStop(1,'#bbb'); }
            else { g.addColorStop(0,hexToRgba(this.color,1)); g.addColorStop(0.7,hexToRgba(this.color,0.4)); g.addColorStop(1,hexToRgba(this.color,0.15)); }
            ctx.fillStyle=g; ctx.beginPath();
            for (let i=0;i<6;i++) {
                const a=(Math.PI/3)*i-Math.PI/6;
                const px=Math.cos(a)*hw, py=Math.sin(a)*hh;
                i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
            }
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle=flash?'#fff':this.color; ctx.lineWidth=2.5; ctx.stroke();
            if (!flash) {
                ctx.strokeStyle=hexToRgba(this.color,0.3); ctx.lineWidth=1; ctx.beginPath();
                for (let i=0;i<6;i++) {
                    const a=(Math.PI/3)*i-Math.PI/6;
                    ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*hw*0.65, Math.sin(a)*hh*0.65);
                }
                ctx.stroke();
            }
            const cg=ctx.createRadialGradient(0,0,0,0,0,10);
            if (flash) { cg.addColorStop(0,'#fff'); cg.addColorStop(1,'rgba(255,255,255,0.2)'); }
            else { cg.addColorStop(0,'#fff'); cg.addColorStop(0.5,hexToRgba(this.color,0.9)); cg.addColorStop(1,hexToRgba(this.color,0.2)); }
            ctx.fillStyle=cg; ctx.shadowColor=this.color; ctx.shadowBlur=15;
            ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
        }
        _drawHealthBar(ctx) {
            const bw=this.width*0.8, bh=4, by=-this.height/2-10, bx=-bw/2;
            const ratio=Math.max(0,this.hp/this.maxHp);
            ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(bx-2,by-2,bw+4,bh+4);
            ctx.fillStyle='rgba(80,0,0,0.8)'; ctx.fillRect(bx,by,bw,bh);
            const hg=ctx.createLinearGradient(bx,by,bx+bw*ratio,by);
            hg.addColorStop(0,'#ff2200'); hg.addColorStop(0.5,'#ff5500'); hg.addColorStop(1,'#ff8833');
            ctx.fillStyle=hg; ctx.fillRect(bx,by,bw*ratio,bh);
            ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(bx,by,bw*ratio,bh/2);
        }
    }

    // ================================================================
    // Boss（增强版）
    // ================================================================
    class Boss {
        constructor(level, cw) {
            this.level=level; this.width=140; this.height=110;
            this.maxHp=40+level*25; this.hp=this.maxHp;
            this.score=3000+level*1500;
            this.x=cw/2; this.y=-this.height; this.cw=cw; this.active=true;
            this.state='entering'; this.enterSpeed=2; this.targetY=70;
            this.sineOffset=0; this.sineAmplitude=110; this.sineFrequency=0.012; this.elapsed=0;
            this.attackMode=0; this.attackTimer=0;
            this.attackInterval=1000; this.modeChangeTimer=0; this.modeChangeInterval=5000;
            this.deathTimer=0; this.deathDuration=2000; this.flashTimer=0;
            this.pulsePhase=0; this.hitFlash=0;
        }
        update(dt, player) {
            const f=dt/16.67; this.elapsed+=dt; this.pulsePhase+=dt*0.004;
            if (this.flashTimer>0) this.flashTimer-=dt;
            if (this.hitFlash>0) this.hitFlash-=dt;
            let bullets=[];
            switch(this.state) {
                case 'entering':
                    this.y+=this.enterSpeed*f;
                    if (this.y>=this.targetY) { this.y=this.targetY; this.state='fighting'; }
                    break;
                case 'fighting':
                    this.sineOffset+=this.sineFrequency*dt;
                    this.x=this.cw/2+Math.sin(this.sineOffset)*this.sineAmplitude;
                    this.x=clamp(this.x,this.width/2,this.cw-this.width/2);
                    this.modeChangeTimer+=dt;
                    if (this.modeChangeTimer>=this.modeChangeInterval) {
                        this.modeChangeTimer=0; this.attackMode=(this.attackMode+1)%4;
                        switch(this.attackMode) {
                            case 0: this.attackInterval=900; break;
                            case 1: this.attackInterval=500; break;
                            case 2: this.attackInterval=1200; break;
                            case 3: this.attackInterval=300; break;
                        }
                    }
                    this.attackTimer+=dt;
                    if (this.attackTimer>=this.attackInterval) { this.attackTimer=0; bullets=this._fire(player); }
                    break;
                case 'dying':
                    this.deathTimer+=dt;
                    this.sineOffset+=this.sineFrequency*dt*0.2;
                    this.x=this.cw/2+Math.sin(this.sineOffset)*this.sineAmplitude*0.3;
                    if (this.deathTimer>=this.deathDuration) this.active=false;
                    break;
            }
            return bullets;
        }
        _fire(player) {
            const bullets=[]; const bs=4+this.level*0.4;
            switch(this.attackMode) {
                case 0:
                    for (let i=-5;i<=5;i++) {
                        const a=Math.PI/2+i*0.14;
                        bullets.push(new Bullet(this.x, this.y+this.height/2, Math.cos(a)*bs, Math.sin(a)*bs, 1, true, '#ff6644'));
                    }
                    break;
                case 1:
                    if (player&&player.active) {
                        for (const off of [-30,0,30]) {
                            const dx=player.x-(this.x+off), dy=player.y-this.y, d=Math.max(1,Math.sqrt(dx*dx+dy*dy));
                            bullets.push(new Bullet(this.x+off, this.y+this.height/2, (dx/d)*bs, (dy/d)*bs, 1, true, '#ff44aa'));
                        }
                    }
                    break;
                case 2:
                    for (let i=0;i<16;i++) {
                        const a=(Math.PI*2/16)*i + this.elapsed*0.002;
                        bullets.push(new Bullet(this.x, this.y, Math.cos(a)*bs*0.8, Math.sin(a)*bs*0.8, 1, true, '#aa44ff'));
                    }
                    break;
                case 3:
                    for (let i=-1;i<=1;i++) {
                        bullets.push(new Bullet(this.x+i*20, this.y+this.height/2, 0, bs*1.2, 1, true, '#ffff00'));
                    }
                    break;
            }
            return bullets;
        }
        takeDamage(dmg) {
            this.hp-=dmg; this.flashTimer=CONFIG.HIT_FLASH_DURATION; this.hitFlash=100;
            return this.hp<=0;
        }
        render(ctx) {
            ctx.save(); ctx.translate(this.x,this.y);
            if (this.state==='dying') {
                const p = this.deathTimer/this.deathDuration;
                ctx.globalAlpha = 1-p;
                ctx.rotate(p*0.3);
                ctx.scale(1+p*0.3, 1+p*0.3);
            }
            const flash=this.flashTimer>0;
            const pulse=0.9+0.1*Math.sin(this.pulsePhase);
            ctx.scale(pulse, pulse);
            const hw=this.width/2, hh=this.height/2;

            const c1=flash?'#fff':'#ff2200', c2=flash?'#ddd':'#880000';
            const bg=ctx.createRadialGradient(0,0,10,0,0,hw);
            bg.addColorStop(0,c1); bg.addColorStop(0.6,c2); bg.addColorStop(1,'#330000');
            ctx.fillStyle=bg;
            ctx.beginPath();
            for (let i=0;i<8;i++) {
                const a=(Math.PI/4)*i-Math.PI/8;
                const r = i%2===0 ? hw : hw*0.7;
                const px=Math.cos(a)*r, py=Math.sin(a)*hh;
                i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
            }
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle=flash?'#fff':'#ff4400'; ctx.lineWidth=3; ctx.shadowColor='#ff0000'; ctx.shadowBlur=20; ctx.stroke();
            ctx.shadowBlur=0;

            const coreCol = this.hitFlash>0 ? '#fff' : '#ffcc00';
            const cg=ctx.createRadialGradient(0,0,0,0,0,20);
            cg.addColorStop(0,'#fff'); cg.addColorStop(0.3,coreCol); cg.addColorStop(1,'rgba(255,100,0,0)');
            ctx.fillStyle=cg; ctx.shadowColor='#ffaa00'; ctx.shadowBlur=25;
            ctx.beginPath(); ctx.arc(0,0,20,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;

            for (let i=-1;i<=1;i+=2) {
                ctx.fillStyle=flash?'#fff':'#cc0000';
                ctx.beginPath();
                ctx.moveTo(i*(hw-10), -10); ctx.lineTo(i*(hw+15), 0); ctx.lineTo(i*(hw-10), 10);
                ctx.closePath(); ctx.fill();
            }
            ctx.restore();
        }
        renderHealthBar(ctx, cw) {
            const bw=cw*0.8, bh=8, by=20, bx=(cw-bw)/2;
            const ratio=Math.max(0,this.hp/this.maxHp);
            ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(bx-3,by-3,bw+6,bh+6);
            ctx.fillStyle='rgba(80,0,0,0.9)'; ctx.fillRect(bx,by,bw,bh);
            const hg=ctx.createLinearGradient(bx,by,bx+bw*ratio,by);
            hg.addColorStop(0,'#ff0000'); hg.addColorStop(0.5,'#ff4400'); hg.addColorStop(1,'#ffaa00');
            ctx.fillStyle=hg; ctx.fillRect(bx,by,bw*ratio,bh);
            ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(bx,by,bw*ratio,bh/2);
            ctx.fillStyle='#fff'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
            ctx.fillText(`BOSS Lv.${this.level+1}`, cw/2, by+bh+16);
        }
    }

    // ================================================================
    // 道具（带磁吸）
    // ================================================================
    class PowerUp {
        constructor(typeKey, x) {
            const t=POWERUP_TYPES[typeKey];
            this.typeKey=typeKey; this.x=x; this.y=-20; this.speed=2;
            this.width=28; this.height=28; this.color=t.color; this.label=t.label; this.glow=t.glow;
            this.active=true; this.pulsePhase=Math.random()*Math.PI*2;
        }
        update(dt, ch, player) {
            const f=dt/16.67; this.pulsePhase+=dt*0.005;
            if (player && player.active) {
                const dx=player.x-this.x, dy=player.y-this.y;
                const d=Math.sqrt(dx*dx+dy*dy);
                if (d < CONFIG.MAGNET_RANGE) {
                    const str = CONFIG.MAGNET_STRENGTH * (1 - d/CONFIG.MAGNET_RANGE);
                    this.x += (dx/d) * str * (CONFIG.MAGNET_RANGE - d) * 0.15 * f;
                    this.y += (dy/d) * str * (CONFIG.MAGNET_RANGE - d) * 0.15 * f;
                    this.speed = 1;
                }
            }
            this.y += this.speed*f;
            if (this.y>ch+40) this.active=false;
        }
        render(ctx) {
            ctx.save(); ctx.translate(this.x,this.y);
            const pulse=0.7+0.3*Math.sin(this.pulsePhase);
            const r=this.width/2;
            ctx.fillStyle=hexToRgba(this.glow, 0.2*pulse); ctx.shadowColor=this.glow; ctx.shadowBlur=20*pulse;
            ctx.beginPath(); ctx.arc(0,0,r+8,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle=hexToRgba(this.color,0.6*pulse); ctx.lineWidth=2;
            ctx.beginPath(); ctx.arc(0,0,r+3,0,Math.PI*2); ctx.stroke();
            const ig=ctx.createRadialGradient(0,0,0,0,0,r);
            ig.addColorStop(0,'#fff'); ig.addColorStop(0.4,this.color); ig.addColorStop(1,hexToRgba(this.color,0.5));
            ctx.fillStyle=ig; ctx.shadowColor=this.color; ctx.shadowBlur=10;
            ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke(); ctx.shadowBlur=0;
            ctx.fillStyle='#fff'; ctx.font='bold 16px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.shadowColor=this.color; ctx.shadowBlur=3;
            ctx.fillText(this.label,0,1);
            ctx.restore();
        }
    }

    // ================================================================
    // 输入管理器
    // ================================================================
    class InputManager {
        constructor(canvas, game) {
            this.canvas=canvas; this.game=game;
            this.targetX=CONFIG.WIDTH/2; this.targetY=CONFIG.HEIGHT-100;
            this.lastTouchTime=0; this._bindEvents();
        }
        _screenToGame(cx, cy) {
            const r=this.canvas.getBoundingClientRect();
            return { x:(cx-r.left)*(CONFIG.WIDTH/r.width), y:(cy-r.top)*(CONFIG.HEIGHT/r.height) };
        }
        _bindEvents() {
            this.canvas.addEventListener('mousemove', e => {
                const p=this._screenToGame(e.clientX,e.clientY); this.targetX=p.x; this.targetY=p.y;
            });
            this.canvas.addEventListener('touchstart', e => {
                e.preventDefault();
                const now=Date.now();
                if (now-this.lastTouchTime<CONFIG.DOUBLE_TAP_INTERVAL) { this._triggerBomb(); this.lastTouchTime=0; return; }
                this.lastTouchTime=now;
                const t=e.touches[0]; const p=this._screenToGame(t.clientX,t.clientY);
                this.targetX=p.x; this.targetY=p.y;
            }, {passive:false});
            this.canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                const t=e.touches[0]; const p=this._screenToGame(t.clientX,t.clientY);
                this.targetX=p.x; this.targetY=p.y;
            }, {passive:false});
            document.addEventListener('keydown', e => {
                switch(e.code) {
                    case 'Space': e.preventDefault(); this._triggerBomb(); break;
                    case 'Escape': case 'KeyP': e.preventDefault(); this._togglePause(); break;
                }
            });
        }
        _triggerBomb() { if(this.game) this.game.useBomb(); }
        _togglePause() { if(this.game) this.game.togglePause(); }
        getTarget() { return {x:this.targetX, y:this.targetY}; }
    }

    // ================================================================
    // 生成系统
    // ================================================================
    class SpawnSystem {
        constructor() { this.timer=0; this.nextSpawn=800; this.difficulty=1; }
        updateDifficulty(score) { this.difficulty=1+Math.floor(score/CONFIG.DIFFICULTY_STEP); }
        _getAvailable(score) {
            const a=[];
            for (const k in ENEMY_TYPES) if (score>=ENEMY_TYPES[k].minScore) a.push(k);
            return a;
        }
        _weightedRandom(types, score) {
            const ws=types.map(k=>{
                const ms=ENEMY_TYPES[k].minScore; let w=1;
                if (score>ms*2) w+=2; if (score>ms*4) w+=3;
                return {k,w};
            });
            const tw=ws.reduce((s,w)=>s+w.w,0);
            let r=Math.random()*tw;
            for (const w of ws) { r-=w.w; if (r<=0) return w.k; }
            return ws[ws.length-1].k;
        }
        update(dt, score, cw) {
            this.timer+=dt;
            const interval=Math.max(CONFIG.SPAWN_MIN_INTERVAL, CONFIG.SPAWN_BASE_INTERVAL-this.difficulty*100);
            this.nextSpawn=interval+Math.random()*CONFIG.SPAWN_RANDOM_RANGE;
            if (this.timer<this.nextSpawn) return null;
            this.timer=0;
            const avail=this._getAvailable(score);
            if (avail.length===0) return null;
            const tk=this._weightedRandom(avail,score);
            const t=ENEMY_TYPES[tk];
            const x=randFloat(t.width/2+10, cw-t.width/2-10), y=-t.height;
            return new Enemy(tk,x,y,cw);
        }
        checkBoss(score, bd) {
            const t=CONFIG.BOSS_TRIGGER_SCORES;
            if (bd<t.length && score>=t[bd]) return bd;
            return -1;
        }
        reset() { this.timer=0; this.nextSpawn=800; this.difficulty=1; }
    }

    // ================================================================
    // 碰撞系统
    // ================================================================
    class CollisionSystem {
        check(d) {
            const r={pbHitE:[],pbHitB:[],ebHitP:[],eHitP:[],puCol:[]};
            const {p,pb,e,b,eb,pu}=d;
            if (!p||!p.active) return r;
            for (const bullet of pb) {
                if (!bullet.active) continue;
                for (const en of e) {
                    if (!en.active) continue;
                    if (aabbCollision({x:bullet.x,y:bullet.y,w:bullet.width,h:bullet.height},{x:en.x,y:en.y,w:en.width,h:en.height},0.7,0.8)) {
                        r.pbHitE.push({bullet,en}); bullet.active=false; break;
                    }
                }
            }
            if (b && b.active && b.state!=='dying') {
                for (const bullet of pb) {
                    if (!bullet.active) continue;
                    if (aabbCollision({x:bullet.x,y:bullet.y,w:bullet.width,h:bullet.height},{x:b.x,y:b.y,w:b.width,h:b.height},0.7,0.9)) {
                        r.pbHitB.push({bullet,dmg:bullet.damage}); bullet.active=false;
                    }
                }
            }
            if (!p.invincible) {
                for (const bullet of eb) {
                    if (!bullet.active) continue;
                    if (aabbCollision({x:bullet.x,y:bullet.y,w:bullet.width,h:bullet.height},{x:p.x,y:p.y,w:p.width,h:p.height},1,0.5)) {
                        r.ebHitP.push(bullet); bullet.active=false;
                    }
                }
            }
            if (!p.invincible) {
                for (const en of e) {
                    if (!en.active) continue;
                    if (aabbCollision({x:p.x,y:p.y,w:p.width,h:p.height},{x:en.x,y:en.y,w:en.width,h:en.height},0.6,0.6)) {
                        r.eHitP.push(en);
                    }
                }
            }
            for (const pw of pu) {
                if (!pw.active) continue;
                if (aabbCollision({x:p.x,y:p.y,w:p.width+20,h:p.height+20},{x:pw.x,y:pw.y,w:pw.width,h:pw.height},1,1)) {
                    r.puCol.push(pw); pw.active=false;
                }
            }
            return r;
        }
    }

    // ================================================================
    // 渲染器
    // ================================================================
    class Renderer {
        constructor(canvas) {
            this.canvas=canvas; this.ctx=canvas.getContext('2d');
            this.stars=this._createStars();
        }
        _createStars() {
            const stars=[];
            for (let i=0;i<CONFIG.STAR_COUNT;i++) stars.push({
                x:Math.random()*CONFIG.WIDTH, y:Math.random()*CONFIG.HEIGHT,
                size:randFloat(0.5,2.5), speed:randFloat(0.5,3), alpha:randFloat(0.3,1),
                twinkle: Math.random()*Math.PI*2
            });
            return stars;
        }
        updateStars(dt) {
            const f=dt/16.67;
            for (const s of this.stars) {
                s.y+=s.speed*f; s.twinkle+=dt*0.005;
                if (s.y>CONFIG.HEIGHT) { s.y=-5; s.x=Math.random()*CONFIG.WIDTH; }
            }
        }
        renderBackground() {
            const ctx=this.ctx;
            const bg=ctx.createLinearGradient(0,0,0,CONFIG.HEIGHT);
            bg.addColorStop(0,'#050520'); bg.addColorStop(0.5,'#0a0a2e'); bg.addColorStop(1,'#0f0f3e');
            ctx.fillStyle=bg; ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
            for (const s of this.stars) {
                const a=s.alpha*(0.7+0.3*Math.sin(s.twinkle));
                ctx.fillStyle=`rgba(255,255,255,${a})`;
                ctx.shadowColor='#fff'; ctx.shadowBlur=s.size*2;
                ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill();
            }
            ctx.shadowBlur=0;
        }
        renderHUD(p, score, combo, boss) {
            const ctx=this.ctx;
            ctx.save();
            ctx.fillStyle='#fff'; ctx.font='bold 22px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top';
            ctx.shadowColor='#000'; ctx.shadowBlur=4;
            ctx.fillText(`${score}`, 12, 10);
            const ly=42;
            for (let i=0;i<p.lives;i++) {
                ctx.fillStyle='#ff4444'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=6;
                ctx.beginPath(); const lx=17+i*20;
                ctx.moveTo(lx,ly); ctx.lineTo(lx-8,ly+12); ctx.lineTo(lx+8,ly+12);
                ctx.closePath(); ctx.fill();
            }
            ctx.shadowBlur=0;
            ctx.fillStyle='#ff9900'; ctx.font='bold 15px sans-serif';
            ctx.fillText(`炸弹 x${p.bombCount}`, 12, ly+20);
            ctx.fillStyle=p.fireLevel>=4?'#ffff00':'#44dddd';
            ctx.fillText(`火力 Lv.${p.fireLevel}`, 12, ly+42);
            if (p.shieldActive) {
                ctx.fillStyle='#44aaff'; ctx.fillText('护盾 ON', 12, ly+62);
            }
            ctx.restore();
        }
        renderBombFlash(p) {
            if (p>0) {
                this.ctx.save();
                this.ctx.fillStyle=`rgba(255,255,255,${p*0.6})`;
                this.ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
                this.ctx.restore();
            }
        }
        clear() { this.ctx.clearRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT); }
    }

    // ================================================================
    // 游戏主类
    // ================================================================
    const STATE={MENU:'menu',PLAYING:'playing',PAUSED:'paused',BOSS:'boss',OVER:'over'};

    class Game {
        constructor() {
            this.canvas=document.getElementById('gameCanvas');
            this.renderer=new Renderer(this.canvas); this.ctx=this.renderer.ctx;
            this.audio=new AudioManager(); this.particles=new ParticleSystem();
            this.shake=new ScreenShake(); this.hitStop=new HitStop();
            this.spawnSys=new SpawnSystem(); this.collision=new CollisionSystem();
            this.damageFlashEl=document.getElementById('damageFlash');
            this.comboDisplay=document.getElementById('comboDisplay');
            this.combo=new ComboSystem(this.comboDisplay);
            this.p=new Player(CONFIG.WIDTH,CONFIG.HEIGHT);
            this.pb=[]; this.e=[]; this.eb=[]; this.pu=[]; this.b=null;
            this.state=STATE.MENU; this.score=0; this.hs=this._loadHS();
            this.bd=0; this.bt=false;
            this.bombFlashT=0; this.bombFlashD=300;
            this.lastTime=0; this.animId=null; this.input=null;
            this._resize(); this._setupUI(); this._updateHS();
            window.addEventListener('resize',()=>this._resize());
        }
        _resize() {
            const dpr=window.devicePixelRatio||1;
            const cont=this.canvas.parentElement;
            const cw=cont?cont.clientWidth:window.innerWidth;
            const ch=cont?cont.clientHeight:window.innerHeight;
            const sx=cw/CONFIG.WIDTH, sy=ch/CONFIG.HEIGHT;
            const s=Math.min(sx,sy,1.5);
            this.canvas.style.width=`${CONFIG.WIDTH*s}px`; this.canvas.style.height=`${CONFIG.HEIGHT*s}px`;
            this.canvas.width=CONFIG.WIDTH*dpr; this.canvas.height=CONFIG.HEIGHT*dpr;
            this.ctx.setTransform(dpr,0,0,dpr,0,0);
            this._s=s; this._dpr=dpr;
        }
        _setupUI() {
            document.getElementById('startBtn').addEventListener('click',()=>this.start());
            document.getElementById('resumeBtn').addEventListener('click',()=>this.resume());
            document.getElementById('restartBtn').addEventListener('click',()=>this.start());
        }
        _showScreen(id) {
            this._hideAll();
            const el=document.getElementById(id); if(el) el.classList.remove('hidden');
        }
        _hideAll() { document.querySelectorAll('.overlay').forEach(el=>el.classList.add('hidden')); }
        _loadHS() { try{return parseInt(localStorage.getItem(CONFIG.HIGHSCORE_KEY))||0;}catch(e){return 0;} }
        _saveHS() { try{localStorage.setItem(CONFIG.HIGHSCORE_KEY,this.hs.toString());}catch(e){} }
        _updateHS() {
            const m=document.getElementById('menuHighScore'); if(m) m.textContent=this.hs;
        }
        _flashDamage() {
            this.damageFlashEl.style.opacity='1';
            setTimeout(()=>this.damageFlashEl.style.opacity='0',100);
        }
        start() {
            this.audio.init(); this.audio.resume();
            this.p.reset(); this.pb=[]; this.e=[]; this.eb=[]; this.pu=[]; this.b=null;
            this.score=0; this.bd=0; this.bt=false;
            this.spawnSys.reset(); this.particles.clear();
            this.shake.active=false; this.bombFlashT=0;
            this.combo.reset();
            this._hideAll(); this.state=STATE.PLAYING;
            if (!this.input) this.input=new InputManager(this.canvas,this);
            this.input.targetX=CONFIG.WIDTH/2; this.input.targetY=CONFIG.HEIGHT-100;
            if (!this.animId) { this.lastTime=performance.now(); this._loop(this.lastTime); }
        }
        togglePause() {
            if (this.state===STATE.PLAYING||this.state===STATE.BOSS) {
                this.state=STATE.PAUSED; this._showScreen('pauseScreen');
            } else if (this.state===STATE.PAUSED) this.resume();
        }
        resume() {
            if (this.state===STATE.PAUSED) {
                this.state=this.b?STATE.BOSS:STATE.PLAYING; this._hideAll();
            }
        }
        gameOver() {
            this.state=STATE.OVER;
            if (this.score>this.hs) { this.hs=this.score; this._saveHS(); }
            document.getElementById('finalScore').textContent=this.score;
            document.getElementById('highScore').textContent=this.hs;
            this._updateHS();
            this._showScreen('gameOverScreen');
        }
        useBomb() {
            if (this.state!==STATE.PLAYING&&this.state!==STATE.BOSS) return;
            if (!this.p.useBomb()) return;
            this.audio.playBomb();
            this.bombFlashT=this.bombFlashD;
            this.shake.trigger(15,500);
            this.hitStop.trigger(150);
            for (const en of this.e) {
                if (en.active) {
                    this.score+=Math.floor(en.score*0.5);
                    this.particles.addExplosion(en.x,en.y,'medium');
                    en.active=false;
                }
            }
            this.eb=[];
            if (this.b&&this.b.active&&this.b.state==='fighting') this.b.takeDamage(15);
        }
        _spawnPU(en) {
            const drops=[];
            if (en.width<=30) { if(Math.random()<0.05) drops.push('bomb'); }
            else if (en.width<=50) {
                if(Math.random()<0.18) drops.push('fireup');
                if(Math.random()<0.08) drops.push('bomb');
                if(Math.random()<0.07) drops.push('shield');
            } else {
                if(Math.random()<0.5) drops.push('fireup');
                if(Math.random()<0.25) drops.push('bomb');
                if(Math.random()<0.2) drops.push('shield');
                if(Math.random()<0.12) drops.push('heal');
            }
            for (const t of drops) this.pu.push(new PowerUp(t,en.x+randFloat(-15,15)));
        }
        _triggerBoss(lv) { this.b=new Boss(lv,CONFIG.WIDTH); this.state=STATE.BOSS; this.bt=true; this.shake.trigger(8,300); }
        _handleCol(r) {
            for (const {bullet,en} of r.pbHitE) {
                const killed=en.takeDamage(bullet.damage);
                this.audio.playHit();
                this.particles.addHitParticles(en.x,en.y,en.color);
                this.hitStop.trigger(CONFIG.HIT_STOP_DURATION);
                if (killed) {
                    const combo=this.combo.addKill();
                    const mult=this.combo.getMultiplier();
                    const addScore=Math.floor(en.score*mult);
                    this.score+=addScore;
                    this.audio.playExplosion(en.width>50);
                    const sz=en.width<=30?'small':(en.width<=50?'medium':'large');
                    this.particles.addExplosion(en.x,en.y,sz);
                    const inten=en.width<=30?3:(en.width<=50?5:8);
                    const dx=en.x-this.p.x, dy=en.y-this.p.y; const d=Math.max(1,Math.sqrt(dx*dx+dy*dy));
                    this.shake.trigger(inten,200,-dx/d,-dy/d);
                    this._spawnPU(en);
                    if (combo>=3) this.audio.playCombo(Math.min(combo,10));
                }
            }
            if (r.pbHitB.length>0&&this.b) {
                let td=0;
                for (const {dmg} of r.pbHitB) td+=dmg;
                const killed=this.b.takeDamage(td);
                if (td>0) { this.audio.playHit(); this.particles.addHitParticles(this.b.x,this.b.y,'#ff6600'); }
                if (killed) {
                    this.score+=this.b.score;
                    this.audio.playExplosion(true);
                    for (let i=0;i<8;i++) {
                        setTimeout(()=>{
                            if(this.b) {
                                this.particles.addExplosion(
                                    this.b.x+randFloat(-40,40),
                                    this.b.y+randFloat(-30,30),
                                    'large'
                                );
                                this.shake.trigger(10,100);
                            }
                        }, i*150);
                    }
                    this.particles.addExplosion(this.b.x,this.b.y,'boss');
                    this.shake.trigger(20,800);
                    this.hitStop.trigger(200);
                    this.bd++; this.bt=false;
                    this.pu.push(new PowerUp('fireup',this.b.x-25));
                    this.pu.push(new PowerUp('heal',this.b.x+25));
                    this.pu.push(new PowerUp('bomb',this.b.x));
                    this.b=null; this.state=STATE.PLAYING;
                }
            }
            for (const bullet of r.ebHitP) {
                const hit=this.p.takeDamage();
                if (hit) {
                    this.audio.playDamage(); this._flashDamage(); this.combo.reset();
                    this.particles.addExplosion(this.p.x,this.p.y,'small');
                    this.shake.trigger(8,300);
                    if (!this.p.active) { this.gameOver(); return; }
                }
            }
            for (const en of r.eHitP) {
                const hit=this.p.takeDamage();
                if (hit) {
                    this.audio.playDamage(); this._flashDamage(); this.combo.reset();
                    this.particles.addExplosion(this.p.x,this.p.y,'small');
                    this.particles.addExplosion(en.x,en.y,'small');
                    this.shake.trigger(8,300);
                    en.active=false;
                    if (!this.p.active) { this.gameOver(); return; }
                }
            }
            for (const pu of r.puCol) {
                this.audio.playPowerup();
                this.particles.addCollectParticles(pu.x,pu.y,pu.color);
                this.shake.trigger(2,100);
                switch(pu.typeKey) {
                    case 'bomb': this.p.addBomb(); break;
                    case 'fireup': this.p.upgradeFire(); break;
                    case 'shield': this.p.activateShield(); break;
                    case 'heal': this.p.heal(); break;
                }
            }
        }
        update(dt) {
            if (this.state!==STATE.PLAYING&&this.state!==STATE.BOSS) return;
            if (this.hitStop.update(dt)) return;
            if (this.input) { const t=this.input.getTarget(); this.p.setTarget(t.x,t.y); }
            this.p.update(dt);
            if (this.p.active) {
                const nb=this.p.fire();
                if (nb.length>0) { this.pb.push(...nb); this.audio.playShoot(); }
            }
            for (const b of this.pb) b.update(dt,CONFIG.WIDTH,CONFIG.HEIGHT);
            for (const en of this.e) en.update(dt,CONFIG.HEIGHT,this.p);
            for (const en of this.e) { const nb=en.fire(this.p); if(nb.length>0) this.eb.push(...nb); }
            for (const b of this.eb) b.update(dt,CONFIG.WIDTH,CONFIG.HEIGHT);
            for (const pu of this.pu) pu.update(dt,CONFIG.HEIGHT,this.p);
            if (this.b&&this.b.active) {
                const bb=this.b.update(dt,this.p); if(bb.length>0) this.eb.push(...bb);
            }
            const cr=this.collision.check({p:this.p,pb:this.pb,e:this.e,b:this.b,eb:this.eb,pu:this.pu});
            this._handleCol(cr);
            if (this.state===STATE.PLAYING) {
                const ne=this.spawnSys.update(dt,this.score,CONFIG.WIDTH);
                if (ne) this.e.push(ne);
                if (!this.bt) {
                    const bl=this.spawnSys.checkBoss(this.score,this.bd);
                    if (bl>=0) this._triggerBoss(bl);
                }
                this.spawnSys.updateDifficulty(this.score);
            }
            this.pb=this.pb.filter(b=>b.active); this.e=this.e.filter(e=>e.active);
            this.eb=this.eb.filter(b=>b.active); this.pu=this.pu.filter(p=>p.active);
            this.particles.update(dt); this.shake.update(dt); this.combo.update(dt);
            if (this.bombFlashT>0) this.bombFlashT-=dt;
            if (this.p.y < CONFIG.HEIGHT*0.7) {
                if (Math.random()<0.3) {
                    this.particles.addTrail(this.p.x+randFloat(-8,8), this.p.y+this.p.height/2+randFloat(0,10), '#4488ff', 3);
                }
            }
        }
        render() {
            const ctx=this.ctx;
            this.renderer.clear();
            ctx.save(); this.shake.apply(ctx);
            this.renderer.renderBackground();
            if (this.state===STATE.PLAYING||this.state===STATE.BOSS||this.state===STATE.PAUSED||this.state===STATE.OVER) {
                for (const pu of this.pu) pu.render(ctx);
                for (const b of this.eb) b.render(ctx,this.particles);
                for (const en of this.e) en.render(ctx);
                for (const b of this.pb) b.render(ctx,this.particles);
                if (this.p.active) this.p.render(ctx,this.particles);
                if (this.b&&this.b.active) { this.b.render(ctx); this.b.renderHealthBar(ctx,CONFIG.WIDTH); }
                this.particles.render(ctx);
                if (this.bombFlashT>0) this.renderer.renderBombFlash(this.bombFlashT/this.bombFlashD);
                this.renderer.renderHUD(this.p,this.score,this.combo,this.b);
            }
            ctx.restore();
        }
        _loop(ts) {
            this.animId=requestAnimationFrame(t=>this._loop(t));
            const dt=Math.min(ts-this.lastTime,CONFIG.DT_CAP); this.lastTime=ts;
            this.renderer.updateStars(dt);
            if (this.state!==STATE.MENU&&this.state!==STATE.PAUSED&&this.state!==STATE.OVER) this.update(dt);
            this.render();
        }
        startLoop() {
            if (!this.animId) { this.lastTime=performance.now(); this._loop(this.lastTime); }
        }
    }

    document.addEventListener('DOMContentLoaded', ()=>{
        const game=new Game();
        game.startLoop();
        game._showScreen('menuScreen');
    });
    </script>
</body>
