            this.powerups = [];
            this.boss = null;

            // 游戏状态
            this.state = GAME_STATE.MENU;
            this.score = 0;
            this.highScore = this._loadHighScore();
            this.bossDefeated = 0; // 已击败的 Boss 数量
            this.bossTriggered = false; // 当前 Boss 是否已触发

            // 炸弹闪白效果
            this.bombFlashTimer = 0;
            this.bombFlashDuration = 300;

            // 帧计时
            this.lastTime = 0;
            this.animFrameId = null;

            // 输入管理器
            this.inputManager = null;

            // 初始化
            this._resizeCanvas();
            this._setupUI();
            this._updateHighScoreDisplay();

            // 监听窗口大小变化
            window.addEventListener('resize', () => this._resizeCanvas());
        }

        /**
         * 调整 Canvas 大小以适配屏幕
         */
        _resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const container = this.canvas.parentElement;
            const containerWidth = container ? container.clientWidth : window.innerWidth;
            const containerHeight = container ? container.clientHeight : window.innerHeight;

            // 计算适配比例
            const scaleX = containerWidth / CONFIG.WIDTH;
            const scaleY = containerHeight / CONFIG.HEIGHT;
            const scale = Math.min(scaleX, scaleY, 1.5); // 最大放大 1.5 倍

            // 设置 CSS 尺寸
            this.canvas.style.width = `${CONFIG.WIDTH * scale}px`;
            this.canvas.style.height = `${CONFIG.HEIGHT * scale}px`;

            // 设置实际分辨率（高 DPI）
            this.canvas.width = CONFIG.WIDTH * dpr;
            this.canvas.height = CONFIG.HEIGHT * dpr;

            // 缩放上下文
            this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            this._scale = scale;
            this._dpr = dpr;
        }

        /**
         * 设置 UI 按钮事件
         */
        _setupUI() {
            // 开始按钮
            document.getElementById('startBtn').addEventListener('click', () => {
                this.startGame();
            });

            // 继续按钮
            document.getElementById('resumeBtn').addEventListener('click', () => {
                this.resumeGame();
            });

            // 重新开始按钮
            document.getElementById('restartBtn').addEventListener('click', () => {
                this.startGame();
            });
        }

        /**
         * 显示指定界面
         * @param {string} id - 界面元素 ID
         */
        _showScreen(id) {
            this._hideAllScreens();
            const el = document.getElementById(id);
            if (el) {
                el.classList.remove('hidden');
            }
        }

        /**
         * 隐藏所有界面
         */
        _hideAllScreens() {
            const overlays = document.querySelectorAll('.overlay');
            overlays.forEach(el => el.classList.add('hidden'));
        }

        /**
         * 加载最高分
         */
        _loadHighScore() {
            try {
                return parseInt(localStorage.getItem(CONFIG.HIGHSCORE_KEY)) || 0;
            } catch (e) {
                return 0;
            }
        }

        /**
         * 保存最高分
         */
        _saveHighScore() {
            try {
                localStorage.setItem(CONFIG.HIGHSCORE_KEY, this.highScore.toString());
            } catch (e) {
                // localStorage 不可用
            }
        }

        /**
         * 更新最高分显示
         */
        _updateHighScoreDisplay() {
            const menuEl = document.getElementById('menuHighScore');
            if (menuEl) menuEl.textContent = this.highScore;
        }

        /**
         * 开始游戏
         */
        startGame() {
            // 初始化音频（需要用户交互）
            this.audio.init();
            this.audio.resume();

            // 重置所有游戏对象
            this.player.reset();
            this.playerBullets = [];
            this.enemies = [];
            this.enemyBullets = [];
            this.powerups = [];
            this.boss = null;
            this.score = 0;
            this.bossDefeated = 0;
            this.bossTriggered = false;
            this.spawnSystem.reset();
            this.particles.clear();
            this.shake.active = false;
            this.bombFlashTimer = 0;

            // 隐藏界面
            this._hideAllScreens();

            // 设置状态
            this.state = GAME_STATE.PLAYING;

            // 初始化输入管理器
            if (!this.inputManager) {
                this.inputManager = new InputManager(this.canvas, this);
            }

            // 重置目标位置
            this.inputManager.targetX = CONFIG.WIDTH / 2;
            this.inputManager.targetY = CONFIG.HEIGHT - 100;

            // 启动游戏循环
            if (!this.animFrameId) {
                this.lastTime = performance.now();
                this._gameLoop(this.lastTime);
            }
        }

        /**
         * 切换暂停
         */
        togglePause() {
            if (this.state === GAME_STATE.PLAYING || this.state === GAME_STATE.BOSS_FIGHT) {
                this.state = GAME_STATE.PAUSED;
                this._showScreen('pauseScreen');
            } else if (this.state === GAME_STATE.PAUSED) {
                this.resumeGame();
            }
        }

        /**
         * 继续游戏
         */
        resumeGame() {
            if (this.state === GAME_STATE.PAUSED) {
                this.state = this.boss ? GAME_STATE.BOSS_FIGHT : GAME_STATE.PLAYING;
                this._hideAllScreens();
            }
        }

        /**
         * 游戏结束
         */
        gameOver() {
            this.state = GAME_STATE.GAME_OVER;

            // 更新最高分
            if (this.score > this.highScore) {
                this.highScore = this.score;
                this._saveHighScore();
            }

            // 更新界面显示
            document.getElementById('finalScore').textContent = this.score;
            document.getElementById('highScore').textContent = this.highScore;
            this._updateHighScoreDisplay();

            // 显示结束界面
            this._showScreen('gameOverScreen');
        }

        /**
         * 使用炸弹
         */
        useBomb() {
            if (this.state !== GAME_STATE.PLAYING && this.state !== GAME_STATE.BOSS_FIGHT) return;
            if (!this.player.useBomb()) return;

            // 播放音效
            this.audio.playBomb();

            // 清屏效果
            this.bombFlashTimer = this.bombFlashDuration;

            // 消灭所有普通敌机 + 加分
            for (const enemy of this.enemies) {
                if (enemy.active) {
                    this.score += enemy.score;
                    this.particles.addExplosion(enemy.x, enemy.y, 'medium');
                    enemy.active = false;
                }
            }

            // 清除所有敌弹
            this.enemyBullets = [];

            // Boss 扣 10 点伤害
            if (this.boss && this.boss.active && this.boss.state === 'fighting') {
                this.boss.takeDamage(10);
            }

            // 屏幕震动
            this.shake.trigger(10, 400);
        }

        /**
         * 生成道具掉落
         * @param {object} enemy - 被击毁的敌机
         */
        _spawnPowerups(enemy) {
            const typeKey = enemy.typeKey;
            const drops = [];

            // 根据敌机类型决定掉落概率
            if (enemy.width <= 30) {
                // 小型敌机：3% 炸弹
                if (Math.random() < 0.03) drops.push('bomb');
            } else if (enemy.width <= 50) {
                // 中型敌机
                if (Math.random() < 0.15) drops.push('fireup');
                if (Math.random() < 0.07) drops.push('bomb');
                if (Math.random() < 0.06) drops.push('shield');
            } else {
                // 大型敌机
                if (Math.random() < 0.40) drops.push('fireup');
                if (Math.random() < 0.20) drops.push('bomb');
                if (Math.random() < 0.15) drops.push('shield');
                if (Math.random() < 0.10) drops.push('heal');
            }

            for (const type of drops) {
                this.powerups.push(new PowerUp(type, enemy.x + randFloat(-10, 10)));
            }
        }

        /**
         * 触发 Boss
         * @param {number} level - Boss 等级
         */
        _triggerBoss(level) {
            this.boss = new Boss(level, CONFIG.WIDTH);
            this.state = GAME_STATE.BOSS_FIGHT;
            this.bossTriggered = true;
        }

        /**
         * 处理碰撞结果
         * @param {object} result - CollisionSystem.check() 的返回值
         */
        _handleCollisions(result) {
            // --- 玩家子弹命中敌机 ---
            for (const { bullet, enemy } of result.playerBulletsHitEnemies) {
                const killed = enemy.takeDamage(bullet.damage);
                this.audio.playHit();
                this.particles.addHitParticles(enemy.x, enemy.y);

                if (killed) {
                    // 敌机被消灭
                    this.score += enemy.score;
                    this.audio.playExplosion();

                    // 根据敌机大小决定爆炸效果
                    const size = enemy.width <= 30 ? 'small' : (enemy.width <= 50 ? 'medium' : 'large');
                    this.particles.addExplosion(enemy.x, enemy.y, size);

                    // 震动
                    const intensity = enemy.width <= 30 ? 2 : (enemy.width <= 50 ? 4 : 6);
                    this.shake.trigger(intensity, 150);

                    // 生成道具
                    this._spawnPowerups(enemy);
                }
            }

            // --- 玩家子弹命中 Boss ---
            if (result.playerBulletsHitBoss.length > 0 && this.boss) {
                let totalDamage = 0;
                for (const { bossDamage } of result.playerBulletsHitBoss) {
                    totalDamage += bossDamage;
                }
                const killed = this.boss.takeDamage(totalDamage);
                if (totalDamage > 0) {
                    this.audio.playHit();
                }

                if (killed) {
                    // Boss 被击败
                    this.score += this.boss.score;
                    this.audio.playExplosion();
                    this.particles.addExplosion(this.boss.x, this.boss.y, 'large');
                    this.shake.trigger(8, 300);
                    this.bossDefeated++;
                    this.bossTriggered = false;

                    // Boss 必定掉落 fireup + heal
                    this.powerups.push(new PowerUp('fireup', this.boss.x - 20));
                    this.powerups.push(new PowerUp('heal', this.boss.x + 20));

                    // Boss 击败后返回正常游戏
                    this.boss = null;
                    this.state = GAME_STATE.PLAYING;
                }
            }

            // --- 敌弹命中玩家 ---
            for (const bullet of result.enemyBulletsHitPlayer) {
                const hit = this.player.takeDamage();
                if (hit) {
                    this.audio.playDamage();
                    this.particles.addExplosion(this.player.x, this.player.y, 'small');
                    this.shake.trigger(5, 200);
                    if (!this.player.active) {
                        this.gameOver();
                        return;
                    }
                }
            }

            // --- 敌机碰撞玩家 ---
            for (const enemy of result.enemiesHitPlayer) {
                const hit = this.player.takeDamage();
                if (hit) {
                    this.audio.playDamage();
                    this.particles.addExplosion(this.player.x, this.player.y, 'small');
                    this.shake.trigger(5, 200);
                    // 敌机也被撞毁
                    enemy.active = false;
                    this.particles.addExplosion(enemy.x, enemy.y, 'small');
                    if (!this.player.active) {
                        this.gameOver();
                        return;
                    }
                }
            }

            // --- 道具拾取 ---
            for (const powerup of result.powerupsCollected) {
                this.audio.playPowerup();
                this.particles.addCollectParticles(powerup.x, powerup.y);

                switch (powerup.typeKey) {
                    case 'bomb':
                        this.player.addBomb();
                        break;
                    case 'fireup':
                        this.player.upgradeFire();
                        break;
                    case 'shield':
                        this.player.activateShield();
                        break;
                    case 'heal':
                        this.player.heal();
                        break;
                }
            }
        }

        /**
         * 游戏逻辑更新
         * @param {number} dt - 帧间隔 (ms)
         */
        update(dt) {
            // 只在 playing/boss_fight 状态更新
            if (this.state !== GAME_STATE.PLAYING && this.state !== GAME_STATE.BOSS_FIGHT) return;

            // 更新输入目标到玩家
            if (this.inputManager) {
                const target = this.inputManager.getTarget();
                this.player.setTarget(target.x, target.y);
            }

            // 更新玩家
            this.player.update(dt);

            // 自动射击
            if (this.player.active) {
                const newBullets = this.player.fire();
                if (newBullets.length > 0) {
                    this.playerBullets.push(...newBullets);
                    this.audio.playShoot();
                }
            }

            // 更新玩家子弹
            for (const bullet of this.playerBullets) {
                bullet.update(dt, CONFIG.WIDTH, CONFIG.HEIGHT);
            }

            // 更新敌机
            for (const enemy of this.enemies) {
                enemy.update(dt, CONFIG.HEIGHT, this.player);
            }

            // 更新敌机子弹（由敌机发射）
            for (const enemy of this.enemies) {
                const newBullets = enemy.fire(this.player);
                if (newBullets.length > 0) {
                    this.enemyBullets.push(...newBullets);
                }
            }

            // 更新敌方子弹
            for (const bullet of this.enemyBullets) {
                bullet.update(dt, CONFIG.WIDTH, CONFIG.HEIGHT);
            }

            // 更新道具
            for (const powerup of this.powerups) {
                powerup.update(dt, CONFIG.HEIGHT);
            }

            // 更新 Boss
            if (this.boss && this.boss.active) {
                const bossBullets = this.boss.update(dt, this.player);
                if (bossBullets.length > 0) {
                    this.enemyBullets.push(...bossBullets);
                }
            }

            // 碰撞检测
            const collisionResult = this.collisionSystem.check({
                player: this.player,
                playerBullets: this.playerBullets,
                enemies: this.enemies,
                boss: this.boss,
                enemyBullets: this.enemyBullets,
                powerups: this.powerups
            });
            this._handleCollisions(collisionResult);

            // 生成系统
            if (this.state === GAME_STATE.PLAYING) {
                const newEnemy = this.spawnSystem.update(dt, this.score, CONFIG.WIDTH);
                if (newEnemy) {
                    this.enemies.push(newEnemy);
                }

                // 检查 Boss 触发
                if (!this.bossTriggered) {
                    const bossLevel = this.spawnSystem.checkBoss(this.score, this.bossDefeated);
                    if (bossLevel >= 0) {
                        this._triggerBoss(bossLevel);
                    }
                }

                // 更新难度
                this.spawnSystem.updateDifficulty(this.score);
            }

            // 清理不活跃对象
            this.playerBullets = this.playerBullets.filter(b => b.active);
            this.enemies = this.enemies.filter(e => e.active);
            this.enemyBullets = this.enemyBullets.filter(b => b.active);
            this.powerups = this.powerups.filter(p => p.active);

            // 更新粒子
            this.particles.update(dt);

            // 更新震动
            this.shake.update(dt);

            // 更新炸弹闪白
            if (this.bombFlashTimer > 0) {
                this.bombFlashTimer -= dt;
            }
        }

        /**
         * 渲染
         */
        render() {
            const ctx = this.ctx;

            // 清空画布
            this.renderer.clear();

            // 应用屏幕震动
            ctx.save();
            this.shake.apply(ctx);

            // 渲染背景（所有状态下都渲染）
            this.renderer.renderBackground();

            // 只在游戏进行中或暂停时渲染游戏对象
            if (this.state === GAME_STATE.PLAYING ||
                this.state === GAME_STATE.BOSS_FIGHT ||
                this.state === GAME_STATE.PAUSED ||
                this.state === GAME_STATE.GAME_OVER) {

                // 渲染道具
                for (const powerup of this.powerups) {
                    powerup.render(ctx);
                }

                // 渲染敌方子弹
                for (const bullet of this.enemyBullets) {
                    bullet.render(ctx);
                }

                // 渲染敌机
                for (const enemy of this.enemies) {
                    enemy.render(ctx);
                }

                // 渲染玩家子弹
                for (const bullet of this.playerBullets) {
                    bullet.render(ctx);
                }

                // 渲染玩家
                if (this.player.active) {
                    this.player.render(ctx);
                }

                // 渲染 Boss
                if (this.boss && this.boss.active) {
                    this.boss.render(ctx);
                    // Boss 血条
                    this.boss.renderHealthBar(ctx, CONFIG.WIDTH);
                }

                // 渲染粒子
                this.particles.render(ctx);

                // 渲染炸弹闪白
                if (this.bombFlashTimer > 0) {
                    this.renderer.renderBombFlash(this.bombFlashTimer / this.bombFlashDuration);
                }

                // 渲染 HUD
                this.renderer.renderHUD(this.player, this.score);
            }

            ctx.restore();
        }

        /**
         * 游戏主循环
         * @param {number} timestamp - requestAnimationFrame 时间戳
         */
        _gameLoop(timestamp) {
            this.animFrameId = requestAnimationFrame((t) => this._gameLoop(t));

            // 计算帧间隔，限制最大值防跳帧
            const dt = Math.min(timestamp - this.lastTime, CONFIG.DT_CAP);
            this.lastTime = timestamp;

            // 始终更新背景星星
            this.renderer.updateStars(dt);

            // 只在非菜单/非结束状态更新游戏逻辑
            if (this.state !== GAME_STATE.MENU &&
                this.state !== GAME_STATE.PAUSED &&
                this.state !== GAME_STATE.GAME_OVER) {
                this.update(dt);
            }

            // 始终渲染
            this.render();
        }

        /**
         * 启动主循环（在菜单界面也开始循环以显示背景）
         */
        startLoop() {
            if (!this.animFrameId) {
                this.lastTime = performance.now();
                this._gameLoop(this.lastTime);
            }
        }
    }

    // ================================================================
    // 第十六部分：初始化代码（DOMContentLoaded）
    // ================================================================

    document.addEventListener('DOMContentLoaded', () => {
        // 创建游戏实例
        const game = new Game();

        // 启动主循环（背景动画在菜单界面也运行）
        game.startLoop();

        // 显示菜单界面
        game._showScreen('menuScreen');
    });
    </script>
</body>
</html>
