<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0D9488">
  <meta name="description" content="英语对话剧本库 - 283 篇情景剧本，覆盖 14 大生活场景，让口语练习更有趣">
  <title>英语对话剧本库 · 英语口语练习</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
</head>
<body>
  <!-- 顶部导航 -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo" aria-label="英语对话剧本库">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
          </svg>
        </div>
        <span>英语对话剧本库</span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link active">剧本库</a>
        <a href="index.html?fav=1" class="nav-link">我的收藏</a>
        <a href="index.html?done=1" class="nav-link">已完成</a>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <div class="container">
    <!-- 页面标题 -->
    <div class="page-header">
      <h1 class="page-title">英语对话剧本库</h1>
      <p class="page-subtitle">选择感兴趣的剧本，开始你的英语口语练习之旅</p>
    </div>

    <!-- 搜索栏 -->
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" class="search-input" id="searchInput" placeholder="搜索剧本标题、角色或关键词..." autocomplete="off">
      <button class="search-btn" id="searchBtn" aria-label="搜索">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>

    <!-- 分类标签 -->
    <div class="category-tabs" id="categoryTabs">
      <!-- 分类由 JS 动态生成 -->
    </div>

    <!-- 剧本卡片网格 -->
    <div class="script-grid" id="scriptGrid">
      <!-- 卡片由 JS 动态生成 -->
    </div>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <p>没有找到匹配的剧本，试试其他关键词？</p>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <p>英语对话剧本库 · 让口语练习更有趣</p>
  </footer>

  <script src="data/categories.js"></script>
  <script src="js/app.js"></script>
  <script>
    // 首页初始化
    document.addEventListener('DOMContentLoaded', () => {
      App.initHome();
    });
  </script>
</body>
</html>
